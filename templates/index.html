<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

    <title>Chat Seguro E2EE</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/' + dispositivo + '/login.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/' + dispositivo + '/chat.css') }}">
</head>

<body class="{% if tema == 'light' %}light-theme{% endif %}">
    <button id="themeToggleBtn" title="Cambiar tema">🌙</button>

    <div id="customModal" class="modal-overlay" style="display: none;">
        <div class="modal-box">
            <h3 id="modalTitle">Atención</h3>
            <p id="modalMessage"></p>
            <button id="modalCloseBtn">Entendido</button>
        </div>
    </div>

    <div id="login" class="container">
        <h2>Bienvenido al Chat</h2>

        <div class="login-grid">

            <div class="box-section perfil">
                <h4>1. Tu Perfil</h4>
                <input type="text" id="username" placeholder="Tu Nombre" required>

                <div
                    style="display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-top: 15px;">
                    <label for="userColor" style="color: var(--text-color);">Color de tu nombre:</label>
                    <input type="color" id="userColor" value="#8a2be2"
                        style="width: 50px; height: 35px; padding: 0; cursor: pointer;">
                </div>
            </div>

            <div class="box-section sala">
                <h4>2. Unirse a una Sala</h4>
                <input type="text" id="room" placeholder="Nombre de la Sala" required>
                <input type="password" id="password" placeholder="Contraseña de la Sala" required>
                <button id="conectarBtn" style="margin-top: 10px; background-color: var(--btn-bg);">Entrar a la
                    Sala</button>
                <p
                    style="font-size: 0.8rem; color: var(--sys-text); text-align: center; margin-top: 10px; font-style: italic;">
                    La contraseña se usa localmente para cifrar tus mensajes.
                </p>
            </div>

            <div id="historialSalas" class="box-section historial" style="display: none;">
                <h4>Últimas salas visitadas:</h4>
                <div id="listaSalas" style="display: flex; flex-wrap: wrap; gap: 5px; margin-top: 10px;"></div>
            </div>

        </div>
    </div>

    <div id="chat" style="display:none;">

        <div class="chat-header">
            <div style="display: flex; align-items: center; gap: 15px;">
                <button id="salirBtn" class="btn-salir">Salir</button>
                <h2 id="roomTitle" style="margin: 0;"></h2>
            </div>
        </div>

        <div id="mensajes"></div>

        <div class="input-area">
            <div id="emojiPicker" style="display:none;">
                <span class="emoji-opt">😀</span>
                <span class="emoji-opt">😂</span>
                <span class="emoji-opt">😎</span>
                <span class="emoji-opt">❤️</span>
                <span class="emoji-opt">👍</span>
                <span class="emoji-opt">🔥</span>
                <span class="emoji-opt">👀</span>
                <span class="emoji-opt">🎉</span>
            </div>

            <button id="emojiBtn" title="Insertar emoji">😀</button>
            <input type="text" id="mensajeInput" placeholder="Escribe un mensaje...">
            <button id="enviarBtn">Enviar</button>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/libs/socket.io.js') }}"></script>
    <script src="{{ url_for('static', filename='js/libs/crypto-js.min.js') }}"></script>
    <script src="{{ url_for('static', filename='js/libs/jquery-3.6.0.min.js') }}"></script>
    <script type="module" src="{{ url_for('static', filename='js/chat-main.js') }}"></script>
</body>

</html>
